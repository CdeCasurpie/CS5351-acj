name: Debug Windows Vcpkg
on:
  push:
    branches:
      - test-boost-vcpkg

jobs:
  debug-vcpkg:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: ${{ runner.os }}-vcpkg-boost-full

      - name: Install full Boost via vcpkg
        run: |
          vcpkg install boost:x64-windows

      - name: Find Boost config.hpp in vcpkg
        run: |
          $paths = Get-ChildItem -Path C:\vcpkg\installed -Filter "config.hpp" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "boost\\config\.hpp$" }
          foreach ($p in $paths) {
              Write-Output "FOUND BOOST CONFIG IN VCPKG: $($p.FullName)"
          }

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile C++ with MSVC
        run: |
          Set-Content -Path test_boost.cpp -Value @"
          #include <iostream>
          #include <boost/config.hpp>
          #include <boost/version.hpp>
          int main() {
              std::cout << `"Boost Compiler Info: `" << BOOST_COMPILER << `"\n`";
              std::cout << `"Boost version: `" << BOOST_VERSION << `"\n`";
              return 0;
          }
          "@
          
          # Intentar compilar pasándole la ruta estándar de vcpkg
          cl.exe /EHsc /I C:\vcpkg\installed\x64-windows\include test_boost.cpp
          
          .\test_boost.exe

