name: Debug Windows Vcpkg
on:
  push:
    branches:
      - test-boost-vcpkg

jobs:
  debug-vcpkg:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Boost Choco
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: C:\local\boost_1_87_0
          key: ${{ runner.os }}-choco-boost-1.87.0

      - name: Install Boost via Choco
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          choco install boost-msvc-14.3

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile C++ with MSVC
        run: |
          Set-Content -Path test_boost.cpp -Value @"
          #include <iostream>
          #include <boost/config.hpp>
          int main() {
              std::cout << `"Boost Compiler Info: `" << BOOST_COMPILER << `"\n`";
              std::cout << `"Boost version: `" << BOOST_VERSION << `"\n`";
              return 0;
          }
          "@
          
          # Compilar directamente pasándole la ruta que encontramos (-I equivalente en MSVC es /I)
          cl.exe /EHsc /I C:\local\boost_1_87_0 test_boost.cpp
          
          # Ejecutar el binario resultante
          .\test_boost.exe

