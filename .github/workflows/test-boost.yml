name: Debug Windows Vcpkg
on:
  push:
    branches:
      - test-boost-vcpkg

jobs:
  debug-vcpkg:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Boost via vcpkg
        run: |
          vcpkg install boost-headers:x64-windows

      - name: Find Boost config.hpp in vcpkg
        run: |
          $paths = Get-ChildItem -Path C:\vcpkg\installed -Filter "config.hpp" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "boost\\config\.hpp$" }
          foreach ($p in $paths) {
              Write-Output "FOUND BOOST CONFIG: $($p.FullName)"
          }

