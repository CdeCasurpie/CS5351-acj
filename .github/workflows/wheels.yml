name: Build Wheels

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # cibuildwheel automatically downloads the cibuildwheel docker images for linux
      # and runs the build process across different python versions.
      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        if: runner.os == 'Windows'
        with:
          path: C:\vcpkg\installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Cache Boost Choco
        id: cache-boost
        uses: actions/cache@v4
        if: runner.os == 'Windows'
        with:
          path: C:\local\boost_1_87_0
          key: ${{ runner.os }}-choco-boost-1.87.0

      - name: Install Boost via Choco
        if: runner.os == 'Windows' && steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          choco install boost-msvc-14.3

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: "dnf install -y gmp-devel mpfr-devel boost-devel"
          CIBW_BEFORE_ALL_MACOS: "brew install gmp mpfr boost"
          CIBW_ENVIRONMENT_MACOS: 'MACOSX_DEPLOYMENT_TARGET="15.0"'
          CIBW_BEFORE_ALL_WINDOWS: "vcpkg install gmp:x64-windows mpfr:x64-windows"
          CIBW_ENVIRONMENT_WINDOWS: 'SKBUILD_CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake;-DBOOST_ROOT=C:/local/boost_1_87_0;-DVCPKG_EXCLUDE_FIND_PACKAGE_Boost=1"'
          CIBW_SKIP: "cp36-* cp37-* cp38-* pp* *-musllinux_* *i686* *win32*" # Omitir versiones muy viejas o 32 bits

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
