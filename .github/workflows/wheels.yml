name: Build Wheels

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # cibuildwheel automatically downloads the cibuildwheel docker images for linux
      # and runs the build process across different python versions.
      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        if: runner.os == 'Windows'
        with:
          path: C:\vcpkg\installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Set up BOOST_ROOT on Windows
        if: runner.os == 'Windows'
        run: |
          $boost_dir = (Get-ChildItem "C:\hostedtoolcache\windows\Boost" | Sort-Object Name -Descending | Select-Object -First 1).FullName
          $boost_root = Join-Path $boost_dir "x86_64"
          $boost_root_fwd = $boost_root -replace '\\', '/'
          echo "MY_BOOST_ROOT=$boost_root_fwd" >> $env:GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: "dnf install -y gmp-devel mpfr-devel boost-devel"
          CIBW_BEFORE_ALL_MACOS: "brew install gmp mpfr boost"
          CIBW_ENVIRONMENT_MACOS: 'MACOSX_DEPLOYMENT_TARGET="15.0"'
          CIBW_BEFORE_ALL_WINDOWS: "vcpkg install gmp mpfr"
          CIBW_ENVIRONMENT_WINDOWS: 'SKBUILD_CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake;-DVCPKG_EXCLUDE_FIND_PACKAGE_Boost=1;-DBOOST_ROOT=${MY_BOOST_ROOT}"'
          CIBW_SKIP: "cp36-* cp37-* cp38-* pp* *-musllinux_* *i686* *win32*" # Omitir versiones muy viejas o 32 bits

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
