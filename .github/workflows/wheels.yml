name: Build Wheels

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # cibuildwheel automatically downloads the cibuildwheel docker images for linux
      # and runs the build process across different python versions.
      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==2.17.0

      # Para Linux, instalamos GMP y MPFR en el contenedor manylinux antes de compilar
      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BEFORE_ALL_LINUX: "yum install -y gmp-devel mpfr-devel"
          CIBW_SKIP: "cp36-* cp37-* cp38-* pp* *-musllinux_*" # Omitir versiones muy viejas o pypy

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
