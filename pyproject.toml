[build-system]
requires = ["setuptools >= 61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "acj"
version = "0.1.0"
description = "Simplificacion de grafos urbanos y analisis de criminalidad"
authors = [
	{ name="Alejandro", email="alejandro.calizaya@utec.edu.pe" },
	{ name="Cesar", email="cesar.perales@utec.edu.pe" },
	{ name="Jerimy", email="jerimy.sandoval@utec.edu.pe" }
]

requires-python = ">=3.10"
dependencies = [
	"pybind11",
	"numpy",
	"pandas",
	"osmnx",
	"vispy",
	"PyQt5",
	"pytest",
	"geopandas",
	"networkx"
]

[tool.setuptools.packages.find]
where = ["src"]

